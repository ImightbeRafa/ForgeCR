<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Error en el Pago — Forge Costa Rica</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Outfit:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Outfit', sans-serif;
      background: #0A0A0C;
      color: #EAEAEC;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .error-container {
      text-align: center;
      max-width: 480px;
      padding: 40px 24px;
    }
    .error-icon {
      width: 72px;
      height: 72px;
      border: 3px solid #E54D5B;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
    }
    .error-icon svg { color: #E54D5B; }
    .error-title {
      font-family: 'Syne', sans-serif;
      font-size: 2rem;
      font-weight: 800;
      margin-bottom: 12px;
    }
    .error-sub {
      font-size: 1rem;
      color: #8A8A94;
      line-height: 1.65;
      margin-bottom: 32px;
    }
    .btns { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-family: 'Outfit', sans-serif;
      font-size: 0.875rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 16px 32px;
      border-radius: 4px;
      text-decoration: none;
      transition: all 280ms cubic-bezier(0.22, 1, 0.36, 1);
    }
    .btn--primary { background: #D44147; color: #fff; }
    .btn--primary:hover { background: #E25158; transform: translateY(-1px); }
    .btn--secondary { background: transparent; border: 1px solid #2A2A32; color: #EAEAEC; }
    .btn--secondary:hover { border-color: #8A8A94; }
  </style>
</head>
<body>
  <div class="error-container">
    <div class="error-icon">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="6" x2="6" y2="18"></line>
        <line x1="6" y1="6" x2="18" y2="18"></line>
      </svg>
    </div>
    <h1 class="error-title">Error en el Pago</h1>
    <p class="error-sub">Hubo un problema al procesar tu pago. No se realizó ningún cargo. Podés intentar de nuevo o contactarnos por WhatsApp.</p>
    <div class="btns">
      <a href="/#pedido" class="btn btn--primary">Intentar de Nuevo</a>
      <a href="https://wa.me/50671618029" target="_blank" rel="noopener" class="btn btn--secondary">WhatsApp</a>
    </div>
  </div>
</body>
</html>
