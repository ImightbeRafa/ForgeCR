<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="6" fill="#0A0A0C"/>
  <!-- Strap 1: top-left to bottom-right -->
  <line x1="6" y1="6" x2="26" y2="26" stroke="#3A3A42" stroke-width="6" stroke-linecap="round"/>
  <line x1="6" y1="6" x2="26" y2="26" stroke="#C0C0C8" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Strap 2: top-right to bottom-left -->
  <line x1="26" y1="6" x2="6" y2="26" stroke="#3A3A42" stroke-width="6" stroke-linecap="round"/>
  <line x1="26" y1="6" x2="6" y2="26" stroke="#C0C0C8" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Center hub -->
  <circle cx="16" cy="16" r="2.5" fill="#0A0A0C"/>
  <circle cx="16" cy="16" r="1.8" fill="none" stroke="#C0C0C8" stroke-width="0.8"/>
</svg>
